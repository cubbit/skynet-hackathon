<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rclone GUI</title>
    <style>
        :root {
            --color-bg-dark: #040404;
            --color-bg-card: #0a0a0a;
            --color-bg-input: #0f0f0f;
            --color-primary: #0a84ff;
            --color-primary-dark: #0066cc;
            --color-text-white: #ffffff;
            --color-text-grey: #9099A1;
            --color-border: #1a1a1a;
            --color-success: #00ff88;
            --color-error: #ff4444;
            --radius-sm: 4px;
            --radius-md: 8px;
            --spacing-xs: 8px;
            --spacing-sm: 12px;
            --spacing-md: 20px;
            --spacing-lg: 30px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--color-bg-dark);
            color: var(--color-text-white);
            padding: var(--spacing-md);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: var(--spacing-lg);
        }
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-sm);
        }
        .logo-img {
            height: 50px;
            width: auto;
        }
        h1 {
            margin-bottom: var(--spacing-md);
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1.1;
            background: linear-gradient(135deg, #0a84ff 0%, #00d9ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: var(--spacing-md);
        }
        .card {
            background: var(--color-bg-card);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            border: 1px solid var(--color-border);
            transition: all 0.3s ease;
        }
        .card:hover {
            border-color: var(--color-primary);
            box-shadow: 0 8px 32px rgba(10, 132, 255, 0.1);
        }
        .card h2 {
            color: var(--color-text-white);
            margin-bottom: var(--spacing-sm);
            font-size: 1.3em;
            font-weight: 600;
        }
        label {
            display: block;
            margin: var(--spacing-sm) 0 var(--spacing-xs);
            color: var(--color-text-grey);
            font-size: 0.875rem;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            background: var(--color-bg-input);
            color: var(--color-text-white);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s ease;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.15);
        }
        button {
            width: 100%;
            padding: 14px 20px;
            margin-top: var(--spacing-sm);
            background: var(--color-primary);
            color: var(--color-text-white);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9375rem;
            font-family: inherit;
            transition: all 0.2s ease;
        }
        button:hover {
            background: var(--color-primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(10, 132, 255, 0.3);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            background: var(--color-text-grey);
            cursor: not-allowed;
            transform: none;
        }
        .output {
            background: var(--color-bg-input);
            border-radius: var(--radius-sm);
            padding: var(--spacing-sm);
            margin-top: var(--spacing-md);
            max-height: 400px;
            overflow-y: auto;
            font-family: 'SF Mono', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            border: 1px solid var(--color-border);
        }
        .output pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .success { color: var(--color-success); }
        .error { color: var(--color-error); }
        .loading {
            text-align: center;
            padding: var(--spacing-md);
            color: var(--color-primary);
            font-weight: 500;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--color-bg-input);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--color-text-grey);
        }
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-container">
                <img src="/static/logo.png" alt="eRcubbit Logo" class="logo-img" onerror="this.style.display='none'">
                <h1>eRcubbit</h1>
            </div>
            <p style="color: var(--color-text-grey);">Rclone Management Interface</p>
        </div>
        
        <div class="grid">
            <div class="card">
                <h2>🔧 Operazioni</h2>
                <label>Comando</label>
                <select id="command">
                    <option value="copy">Copy (copia file)</option>
                    <option value="sync">Sync (sincronizza)</option>
                    <option value="move">Move (sposta file)</option>
                    <option value="delete">Delete (elimina)</option>
                    <option value="ls">LS (lista file)</option>
                    <option value="lsl">LSL (lista dettagliata)</option>
                    <option value="size">Size (dimensioni)</option>
                </select>
                
                <label>Sorgente</label>
                <input type="text" id="source" placeholder="remote:path/to/folder">
                
                <label>Destinazione (opzionale)</label>
                <input type="text" id="dest" placeholder="remote:path/to/dest">
                
                <label>Opzioni aggiuntive</label>
                <input type="text" id="options" placeholder="--verbose --progress">
                
                <button onclick="executeCommand()" id="execBtn">Esegui</button>
                
                <!-- Progress Bar -->
                <div id="progressContainer" style="display: none; margin-top: var(--spacing-md);">
                    <div style="display: flex; justify-content: space-between; margin-bottom: var(--spacing-xs);">
                        <span style="color: var(--color-text-grey); font-size: 0.875rem;">Progresso</span>
                        <span id="progressPercent" style="color: var(--color-primary); font-weight: 600;">0%</span>
                    </div>
                    <div style="background: var(--color-border); border-radius: var(--radius-sm); height: 8px; overflow: hidden;">
                        <div id="progressBar" style="width: 0%; background: linear-gradient(90deg, var(--color-primary), #00d9ff); height: 100%; transition: width 0.3s ease;"></div>
                    </div>
                    <div id="progressDetails" style="margin-top: var(--spacing-xs); font-size: 0.8125rem; color: var(--color-text-grey);">
                        <div>Trasferiti: <span id="transferred">0 B</span></div>
                        <div>Velocità: <span id="speed">0 B/s</span></div>
                        <div>ETA: <span id="eta">N/A</span></div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <h2>📍 Remoti Configurati</h2>
                <button onclick="loadRemotes()" style="margin-bottom: var(--spacing-sm);">Carica Remoti</button>
                <div id="remotesList" class="output"></div>
            </div>
        </div>

        <!-- Scheduling Section -->
        <div class="card" style="margin-top: var(--spacing-md);">
            <h2>📅 Schedulazione Backup</h2>
            
            <div class="grid" style="margin-top: var(--spacing-md);">
                <div>
                    <label>Nome Backup</label>
                    <input type="text" id="scheduleName" placeholder="es. Backup Giornaliero">
                </div>
                <div>
                    <label>Comando</label>
                    <select id="scheduleCommand">
                        <option value="copy">Copy</option>
                        <option value="sync">Sync</option>
                        <option value="move">Move</option>
                    </select>
                </div>
            </div>
            
            <div class="grid" style="margin-top: var(--spacing-sm);">
                <div>
                    <label>Sorgente</label>
                    <input type="text" id="scheduleSource" placeholder="remote:path/to/source">
                </div>
                <div>
                    <label>Destinazione</label>
                    <input type="text" id="scheduleDest" placeholder="remote:path/to/dest">
                </div>
            </div>
            
            <div class="grid" style="margin-top: var(--spacing-sm);">
                <div>
                    <label>Cron Expression</label>
                    <select id="cronExpression">
                        <option value="0 * * * *">Ogni ora</option>
                        <option value="0 0 * * *">Ogni giorno (mezzanotte)</option>
                        <option value="0 2 * * *">Ogni giorno (2:00 AM)</option>
                        <option value="0 0 * * 0">Ogni domenica</option>
                        <option value="0 0 1 * *">Primo del mese</option>
                        <option value="*/15 * * * *">Ogni 15 minuti</option>
                        <option value="custom">Personalizzato...</option>
                    </select>
                </div>
                <div>
                    <label>Opzioni (opzionale)</label>
                    <input type="text" id="scheduleOptions" placeholder="--verbose --progress">
                </div>
            </div>
            
            <button onclick="createSchedule()" style="margin-top: var(--spacing-sm); background: linear-gradient(135deg, #0a84ff, #00d9ff);">Aggiungi Schedule</button>
        </div>

        <!-- Schedules List -->
        <div class="card" style="margin-top: var(--spacing-md);">
            <h2>📋 Schedulazioni Attive</h2>
            <button onclick="loadSchedules()" style="margin-bottom: var(--spacing-sm); padding: 10px 16px; width: auto;">🔄 Aggiorna Lista</button>
            <div id="schedulesList" class="output"></div>
        </div>
        
        <div class="card" style="margin-top: var(--spacing-md);">
            <h2>💬 Output</h2>
            <div id="output" class="output">
                <pre>Attendi esecuzione comando...</pre>
            </div>
        </div>

        <!-- Execution Logs -->
        <div class="card" style="margin-top: var(--spacing-md);">
            <h2>📜 Log Esecuzioni</h2>
            <button onclick="loadLogs()" style="margin-bottom: var(--spacing-sm); padding: 10px 16px; width: auto;">📥 Carica Log</button>
            <div id="logsList" class="output"></div>
        </div>
    </div>

    <script>
        async function executeCommand() {
            const btn = document.getElementById('execBtn');
            const output = document.getElementById('output');
            const progressContainer = document.getElementById('progressContainer');
            
            btn.disabled = true;
            progressContainer.style.display = 'block';
            output.innerHTML = '<div class="loading">⏳ Esecuzione in corso...</div>';
            
            const data = {
                command: document.getElementById('command').value,
                source: document.getElementById('source').value,
                dest: document.getElementById('dest').value,
                options: document.getElementById('options').value
            };
            
            try {
                const response = await fetch('/api/rclone', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.error) {
                    output.innerHTML = `<pre class="error">❌ Errore: ${result.error}</pre>`;
                } else {
                    let html = '';
                    if (result.stdout) {
                        html += `<pre class="success">${result.stdout}</pre>`;
                    }
                    output.innerHTML = html || '<pre class="success">✅ Completato</pre>';
                    
                    // Update progress bar
                    if (result.progress) {
                        updateProgressBar(result.progress);
                    }
                }
            } catch (error) {
                output.innerHTML = `<pre class="error">❌ Errore: ${error.message}</pre>`;
            }
            
            btn.disabled = false;
        }
        
        function updateProgressBar(progress) {
            document.getElementById('progressBar').style.width = progress.percent + '%';
            document.getElementById('progressPercent').textContent = progress.percent.toFixed(1) + '%';
            document.getElementById('transferred').textContent = progress.transferred || '0 B';
            document.getElementById('speed').textContent = progress.speed || '0 B/s';
            document.getElementById('eta').textContent = progress.eta || 'N/A';
        }
        
        async function loadRemotes() {
            const output = document.getElementById('remotesList');
            output.innerHTML = '<div class="loading">⏳ Caricamento...</div>';
            
            try {
                const response = await fetch('/api/remotes');
                const result = await response.json();
                
                if (result.error) {
                    output.innerHTML = `<pre class="error">❌ Errore: ${result.error}</pre>`;
                } else {
                    output.innerHTML = `<pre class="success">${result.remotes.length > 0 ? result.remotes.join('\n') : 'Nessun remoto configurato'}</pre>`;
                }
            } catch (error) {
                output.innerHTML = `<pre class="error">❌ Errore: ${error.message}</pre>`;
            }
        }
        
        async function createSchedule() {
            const name = document.getElementById('scheduleName').value;
            const command = document.getElementById('scheduleCommand').value;
            const source = document.getElementById('scheduleSource').value;
            const dest = document.getElementById('scheduleDest').value;
            const cronExpression = document.getElementById('cronExpression').value;
            const options = document.getElementById('scheduleOptions').value;
            
            if (!name || !source) {
                alert('Nome e Sorgente sono obbligatori!');
                return;
            }
            
            try {
                const response = await fetch('/api/schedules', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, command, source, dest, options, cron_expression: cronExpression })
                });
                
                const result = await response.json();
                
                if (result.error) {
                    alert('Errore: ' + result.error);
                } else {
                    alert('✅ Schedulazione creata con successo!');
                    document.getElementById('scheduleName').value = '';
                    document.getElementById('scheduleSource').value = '';
                    document.getElementById('scheduleDest').value = '';
                    loadSchedules();
                }
            } catch (error) {
                alert('Errore: ' + error.message);
            }
        }
        
        async function loadSchedules() {
            const output = document.getElementById('schedulesList');
            output.innerHTML = '<div class="loading">⏳ Caricamento...</div>';
            
            try {
                const response = await fetch('/api/schedules');
                const result = await response.json();
                
                if (result.error) {
                    output.innerHTML = `<pre class="error">❌ Errore: ${result.error}</pre>`;
                } else if (result.schedules.length === 0) {
                    output.innerHTML = '<pre>Nessuna schedulazione attiva.</pre>';
                } else {
                    let html = '<table style="width: 100%; border-collapse: collapse;">';
                    html += '<tr style="text-align: left; border-bottom: 1px solid var(--color-border);">';
                    html += '<th style="padding: 10px;">Nome</th>';
                    html += '<th style="padding: 10px;">Comando</th>';
                    html += '<th style="padding: 10px;">Sorgente</th>';
                    html += '<th style="padding: 10px;">Destinazione</th>';
                    html += '<th style="padding: 10px;">Cron</th>';
                    html += '<th style="padding: 10px;">Azioni</th>';
                    html += '</tr>';
                    
                    result.schedules.forEach(s => {
                        html += `<tr style="border-bottom: 1px solid var(--color-border);">`;
                        html += `<td style="padding: 10px;">${s.name}</td>`;
                        html += `<td style="padding: 10px;">${s.command}</td>`;
                        html += `<td style="padding: 10px;">${s.source}</td>`;
                        html += `<td style="padding: 10px;">${s.dest || '-'}</td>`;
                        html += `<td style="padding: 10px;">${s.cron_expression}</td>`;
                        html += `<td style="padding: 10px;">`;
                        html += `<button onclick="deleteSchedule(${s.id})" style="padding: 5px 10px; margin: 2px; width: auto; background: #ff4444;">🗑️</button>`;
                        html += `</td>`;
                        html += '</tr>';
                    });
                    
                    html += '</table>';
                    output.innerHTML = html;
                }
            } catch (error) {
                output.innerHTML = `<pre class="error">❌ Errore: ${error.message}</pre>`;
            }
        }
        
        async function deleteSchedule(scheduleId) {
            if (!confirm('Sei sicuro di voler eliminare questa schedulazione?')) return;
            
            try {
                await fetch(`/api/schedules/${scheduleId}`, { method: 'DELETE' });
                loadSchedules();
            } catch (error) {
                alert('Errore: ' + error.message);
            }
        }
        
        async function loadLogs() {
            const output = document.getElementById('logsList');
            output.innerHTML = '<div class="loading">⏳ Caricamento...</div>';
            
            try {
                const response = await fetch('/api/logs?limit=20');
                const result = await response.json();
                
                if (result.error) {
                    output.innerHTML = `<pre class="error">❌ Errore: ${result.error}</pre>`;
                } else if (result.logs.length === 0) {
                    output.innerHTML = '<pre>Nessun log disponibile.</pre>';
                } else {
                    let html = '<table style="width: 100%; border-collapse: collapse;">';
                    html += '<tr style="text-align: left; border-bottom: 1px solid var(--color-border);">';
                    html += '<th style="padding: 10px;">Data</th>';
                    html += '<th style="padding: 10px;">Schedule</th>';
                    html += '<th style="padding: 10px;">Comando</th>';
                    html += '<th style="padding: 10px;">Stato</th>';
                    html += '</tr>';
                    
                    result.logs.forEach(log => {
                        const statusClass = log.status === 'success' ? 'success' : (log.status === 'error' ? 'error' : '');
                        html += `<tr style="border-bottom: 1px solid var(--color-border);">`;
                        html += `<td style="padding: 10px;">${log.started_at || '-'}</td>`;
                        html += `<td style="padding: 10px;">${log.schedule_name || 'Manuale'}</td>`;
                        html += `<td style="padding: 10px;">${log.command}</td>`;
                        html += `<td style="padding: 10px; color: ${log.status === 'success' ? 'var(--color-success)' : 'var(--color-error)'}">${log.status}</td>`;
                        html += '</tr>';
                    });
                    
                    html += '</table>';
                    output.innerHTML = html;
                }
            } catch (error) {
                output.innerHTML = `<pre class="error">❌ Errore: ${error.message}</pre>`;
            }
        }
        
        // Auto-load remotes and schedules on page load
        window.addEventListener('load', () => {
            loadRemotes();
            loadSchedules();
        });
    </script>
</body>
</html>
